name: Performance Regression Detection

on:
  push:
    branches: [main, develop]
    paths:
      - 'easycord/i18n.py'
      - 'scripts/benchmark_i18n.py'
      - 'tests/test_i18n*.py'
  pull_request:
    branches: [main, develop]
    paths:
      - 'easycord/i18n.py'
      - 'scripts/benchmark_i18n.py'
      - 'tests/test_i18n*.py'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Restore baseline benchmark
        uses: actions/cache/restore@v4
        id: cache-baseline
        with:
          path: baseline-benchmark-results.json
          key: benchmark-baseline-${{ github.base_ref || 'main' }}
          restore-keys: |
            benchmark-baseline-main

      - name: Run performance benchmarks
        run: python scripts/benchmark_i18n.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Check for regressions
        run: |
          python << 'EOF'
          import json
          import sys
          from pathlib import Path

          # Performance thresholds (hard limits)
          THRESHOLDS = {
              "Cold Cache (100 lookups)": {
                  "total_time_ms": 100,
                  "avg_lookup_ms": 1.0,
              },
              "Warm Cache (10k lookups)": {
                  "total_time_ms": 500,
                  "avg_lookup_ms": 0.05,
              },
              "Diagnostics Overhead": {
                  "overhead_percent": 50,
              },
              "Metrics Overhead": {
                  "overhead_percent": 30,
              },
              "Validator Scaling (20 locales)": {
                  "validation_time_ms": 1000,
              },
          }

          # Load current results
          current_file = Path("benchmark-results.json")
          if not current_file.exists():
              print("[!] ERROR: benchmark-results.json not found")
              sys.exit(1)

          with open(current_file) as f:
              current_results = json.load(f)

          # Load baseline results if available
          baseline_file = Path("baseline/benchmark-results.json")
          baseline_results = {}
          if baseline_file.exists():
              with open(baseline_file) as f:
                  baseline_results = json.load(f)

          violations = []
          print("[*] Checking performance thresholds:\n")

          for benchmark_name, thresholds in THRESHOLDS.items():
              if benchmark_name not in current_results:
                  print(f"[!] {benchmark_name}: NOT FOUND in results")
                  violations.append(f"{benchmark_name}: missing from results")
                  continue

              current = current_results[benchmark_name]
              baseline = baseline_results.get(benchmark_name, {})

              print(f"[*] {benchmark_name}")
              for metric, limit in thresholds.items():
                  if metric not in current:
                      print(f"    [!] {metric}: NOT FOUND")
                      violations.append(f"{benchmark_name}.{metric}: missing")
                      continue

                  current_val = current[metric]
                  baseline_val = baseline.get(metric)

                  # Check hard threshold
                  if current_val > limit:
                      status = "FAIL"
                      violations.append(f"{benchmark_name}.{metric}: {current_val} > {limit}")
                  else:
                      status = "OK"

                  # Check regression vs baseline (if available)
                  regression = ""
                  if baseline_val is not None and isinstance(current_val, (int, float)):
                      pct_change = ((current_val - baseline_val) / baseline_val) * 100
                      if pct_change > 10:
                          regression = f" (+{pct_change:.1f}% vs baseline)"
                          if status == "OK":
                              status = "WARN"

                  unit = "ms" if "ms" in metric else "%"
                  print(f"    [{status}] {metric}: {current_val:.2f}{unit} (limit: {limit}{unit}){regression}")

          print("\n" + "=" * 60)
          if violations:
              print(f"[FAIL] {len(violations)} threshold violations:")
              for v in violations:
                  print(f"  - {v}")
              sys.exit(1)
          else:
              print("[PASS] All performance thresholds maintained")
              sys.exit(0)
          EOF

      - name: Save baseline (main/develop only)
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && success()
        uses: actions/cache/save@v4
        with:
          path: benchmark-results.json
          key: benchmark-baseline-${{ github.ref_name }}

      - name: Comment PR with benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Performance benchmarks completed. All thresholds maintained.\n\nSee workflow artifacts for detailed results.'
            })
        continue-on-error: true
