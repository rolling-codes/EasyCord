name: PR Quality
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip ruff && python -m pip install -e ".[dev]"
      - name: Lint critical Python errors (ruff)
        run: ruff check easycord tests --select E9,F63,F7,F82
      - name: Lint advisory (ruff)
        continue-on-error: true
        run: ruff check .
        if: always()
      - name: Test (pytest)
        run: pytest
